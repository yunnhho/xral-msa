server:
  port: 8084

spring:
  application:
    name: queue-service
  data:
    redis:
      host: localhost
      port: 6379
      database: 2
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: queue-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.xrail.common.kafka.event"

queue:
  hmac-secret: ${QUEUE_HMAC_SECRET}
  # 3초마다 최대 100명 승급
  scheduler:
    delay-ms: 3000
    batch-size: 100
  # 활성 토큰 TTL (초)
  active-ttl-seconds: 600
  sse:
    heartbeat-seconds: 25
    heartbeat-ms: 25000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

---
spring:
  config:
    activate:
      on-profile: docker
  data:
    redis:
      host: redis
  kafka:
    bootstrap-servers: kafka:29092

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE}

management:
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
