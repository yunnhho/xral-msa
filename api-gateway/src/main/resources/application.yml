server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.resource.reactive.ReactiveOAuth2ResourceServerAutoConfiguration

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods: [GET, POST, PUT, DELETE, OPTIONS, PATCH]
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**, /oauth2/**, /login/oauth2/**
          filters:
            - name: CircuitBreaker
              args:
                name: auth-service-cb
                fallbackUri: forward:/fallback/auth-service

        - id: train-service
          uri: lb://train-service
          predicates:
            - Path=/api/stations/**, /api/schedules/**, /api/reservations/**
          filters:
            - name: CircuitBreaker
              args:
                name: train-service-cb
                fallbackUri: forward:/fallback/train-service

        - id: queue-service-sse
          uri: lb://queue-service
          predicates:
            - Path=/api/queue/subscribe
          metadata:
            response-timeout: -1
          filters:
            - name: CircuitBreaker
              args:
                name: queue-service-cb
                fallbackUri: forward:/fallback/queue-service

        - id: queue-service
          uri: lb://queue-service
          predicates:
            - Path=/api/queue/**
          filters:
            - name: CircuitBreaker
              args:
                name: queue-service-cb
                fallbackUri: forward:/fallback/queue-service

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - name: CircuitBreaker
              args:
                name: payment-service-cb
                fallbackUri: forward:/fallback/payment-service

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notification-service-cb
                fallbackUri: forward:/fallback/notification-service

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET}
  access-ttl-ms: ${JWT_ACCESS_TTL_MS:1800000}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
    instances:
      auth-service-cb:
        baseConfig: default
      train-service-cb:
        baseConfig: default
      queue-service-cb:
        baseConfig: default
      payment-service-cb:
        baseConfig: default
      notification-service-cb:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
    instances:
      queue-service-cb:
        timeoutDuration: 600s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} traceId=%X{traceId} spanId=%X{spanId} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: docker
  data:
    redis:
      host: redis

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE}

management:
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
